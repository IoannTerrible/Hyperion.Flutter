name: Release to Google Play

on:
  push:
    branches: [product]

# Read-only on the repo — CI never creates or pushes tags or commits.
# The release tag is created manually as the human authorisation step.
permissions:
  contents: read

# Prevent two releases racing on the same branch.
concurrency:
  group: google-play-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout (full history + tags so we can verify the release tag) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # ── Parse version from pubspec.yaml ─────────────────────────────────
      # `version: X.Y.Z+N` → name=X.Y.Z, code=N, tag=vX.Y.Z.
      # The pubspec version is the single source of truth — duplicates and
      # release approval are both keyed off it.
      - name: Parse version
        id: version
        run: |
          line=$(grep -E '^version:' pubspec.yaml | head -1)
          full=$(echo "$line" | awk '{print $2}')          # 2.5.0+19
          name=${full%%+*}                                  # 2.5.0
          code=${full##*+}                                  # 19
          tag="v${name}"
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"   >> "$GITHUB_OUTPUT"
          echo "Resolved version: name=$name code=$code tag=$tag"

      # ── Release gate ─────────────────────────────────────────────────────
      # The tag vX.Y.Z must already exist for CI to release. Create it
      # manually before pushing to `product`:
      #     git tag v2.5.0 && git push origin v2.5.0
      #     git push origin product
      # If the tag is missing, the workflow ends cleanly (green run) and
      # tells you what to do.
      #
      # Duplicate protection is the same gate: the tag is keyed off the
      # pubspec version, so a re-push of `product` with the same version
      # will hit the same tag. To actually re-release, bump the pubspec
      # version + create a new tag. Google Play also rejects re-used
      # versionCode at upload time as a safety net.
      - name: Require release tag for this version
        id: gate
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "✓ Tag $tag exists locally — proceeding."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git ls-remote --tags --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "✓ Tag $tag exists on origin — proceeding."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "⊘ Tag $tag is missing — skipping release."
          echo "  To authorise this release, run:"
          echo "      git tag $tag"
          echo "      git push origin $tag"
          echo "      git push origin product   # re-trigger CI"
          echo "release=false" >> "$GITHUB_OUTPUT"

      # ── Toolchain ───────────────────────────────────────────────────────
      - name: Setup Java 17
        if: steps.gate.outputs.release == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        if: steps.gate.outputs.release == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      # ── Android signing materials ───────────────────────────────────────
      # Two secrets carry the keystore: a base64-encoded .jks blob and the
      # three passwords/alias. They are materialised into the files Gradle
      # expects (android/app/upload-keystore.jks and android/key.properties)
      # only on the runner — never in the repo.
      - name: Decode keystore
        if: steps.gate.outputs.release == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          test -s android/app/upload-keystore.jks

      - name: Write key.properties
        if: steps.gate.outputs.release == 'true'
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # ── Build ───────────────────────────────────────────────────────────
      - name: Flutter pub get
        if: steps.gate.outputs.release == 'true'
        run: flutter pub get

      - name: Build Android App Bundle
        if: steps.gate.outputs.release == 'true'
        run: flutter build appbundle --release

      # ── Upload to Google Play (internal track) ─────────────────────────
      # The service-account JSON authenticates the Play Console API. The
      # action validates the AAB, the versionCode, and rolls out to the
      # chosen track. Google rejects re-used versionCode at this step, so
      # an accidental re-push with the same version errors out loudly.
      - name: Upload AAB to Google Play
        if: steps.gate.outputs.release == 'true'
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: cc.techteastudio.hyperion
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          changesNotSentForReview: false
